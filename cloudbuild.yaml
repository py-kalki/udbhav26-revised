# ── Cloud Build CI/CD Pipeline ─────────────────────────────────────────────────
# Triggers automatically on pushes to the `qa` branch.
# Builds the Docker image, pushes to Artifact Registry, and deploys to Cloud Run.
#
# To set up the trigger via Cloud Console:
#   1. Go to: https://console.cloud.google.com/cloud-build/triggers?project=udbhav26-prod
#   2. Click "Connect Repository" → GitHub → authorize → select KRISHNASON1/udbhav2026
#   3. Click "Create Trigger":
#      - Name:          udbhav2026-qa-to-prod
#      - Event:         Push to branch
#      - Branch:        ^qa$
#      - Build config:  Cloud Build config (cloudbuild.yaml)
#      - Save
#
# Environment secrets (set via Cloud Run service env vars — NOT stored here):
#   MONGODB_URI, CASHFREE_APP_ID, CASHFREE_SECRET_KEY, CASHFREE_WEBHOOK_SECRET,
#   PUSHER_APP_ID, PUSHER_KEY, PUSHER_SECRET, RESEND_API_KEY, ADMIN_SECRET
#
# These are already set on the running service and Cloud Run PRESERVES them
# across deployments when using --image (not --source).
# ──────────────────────────────────────────────────────────────────────────────

substitutions:
  _SERVICE_NAME: udbhav2026
  _REGION: asia-south1

steps:
  # ── Step 1: Build the Docker image ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '--tag=asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$_SERVICE_NAME:$COMMIT_SHA'
      - '--tag=asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$_SERVICE_NAME:latest'
      - '--cache-from=asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$_SERVICE_NAME:latest'
      - '.'

  # ── Step 2: Push to Artifact Registry ──────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    waitFor: ['build-image']
    args:
      - 'push'
      - '--all-tags'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$_SERVICE_NAME'

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────────────────────
  # Uses --image so Cloud Run PRESERVES all existing env vars automatically.
  # Only a new image revision is created — secrets/env vars are untouched.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    waitFor: ['push-image']
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud run deploy $_SERVICE_NAME \
          --image=asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$_SERVICE_NAME:$COMMIT_SHA \
          --region=$_REGION \
          --platform=managed \
          --allow-unauthenticated \
          --quiet

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$_SERVICE_NAME:$COMMIT_SHA'
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$_SERVICE_NAME:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
