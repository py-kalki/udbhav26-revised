# ── Cloud Build CI/CD Pipeline ─────────────────────────────────────────────────
# Triggers automatically on pushes to the `qa` branch.
# Builds the Docker image, pushes to Artifact Registry, and deploys to Cloud Run.
# ──────────────────────────────────────────────────────────────────────────────

substitutions:
  _SERVICE_NAME: udbhav2026
  _REGION: asia-south1
  _REPO: cloud-run-source-deploy

steps:
  # ── Step 1: Build the Docker image ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '--tag=asia-south1-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:$COMMIT_SHA'
      - '--tag=asia-south1-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:latest'
      - '.'

  # ── Step 2: Push to Artifact Registry ──────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    waitFor: ['build-image']
    args:
      - 'push'
      - '--all-tags'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME'

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    waitFor: ['push-image']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=asia-south1-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--quiet'

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:$COMMIT_SHA'
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
