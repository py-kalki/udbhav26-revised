<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teams — UDBHAV'26 Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Variables ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --clr-bg: #080808;
      --clr-surface: #0f0f0f;
      --clr-white: #ffffff;
      --clr-grey: #888888;
      --clr-green: #4ade80;
      --clr-red: #f87171;
      --clr-blue: #60a5fa;
      --clr-amber: #fbbf24;
      --clr-purple: #a855f7;
      --font-display: 'Bebas Neue', sans-serif;
      --font-ui: 'Inter', sans-serif;
      --sidebar-w: 260px;
    }

    body {
      font-family: var(--font-ui);
      background: var(--clr-bg);
      color: var(--clr-white);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Grain overlay ── */
    .grain-overlay {
      position: fixed; inset: 0; z-index: 99;
      pointer-events: none; opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px; mix-blend-mode: overlay;
    }

    /* ═══════════════════════════════════════════════════════════
       SIDEBAR
       ═══════════════════════════════════════════════════════════ */
    .admin-sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: rgba(12,12,12,0.95);
      border-right: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(30px);
      z-index: 50;
      display: flex;
      flex-direction: column;
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
    }

    .sidebar-header {
      padding: 1.5rem 1.4rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .sidebar-logo { height: 28px; width: auto; opacity: 0.85; }

    .sidebar-brand {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .sidebar-brand-name {
      font-family: var(--font-display);
      font-size: 1.2rem;
      letter-spacing: 0.06em;
      color: var(--clr-white);
      line-height: 1;
    }

    .sidebar-brand-sub {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    .sidebar-nav {
      flex: 1;
      padding: 1rem 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .sidebar-nav-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      padding: 0.8rem 0.6rem 0.4rem;
    }

    .sidebar-link {
      display: flex;
      align-items: center; gap: 0.75rem; padding: 0.7rem 0.8rem; border-radius: 10px;
      text-decoration: none; font-size: 0.84rem; font-weight: 500; color: rgba(255,255,255,0.5); transition: all 0.2s;
    }

    .sidebar-link:hover {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.8);
    }

    .sidebar-link.active {
      background: rgba(255,255,255,0.08);
      color: var(--clr-white);
      font-weight: 600;
    }

    .sidebar-link svg {
      width: 18px; height: 18px;
      flex-shrink: 0;
      opacity: 0.6;
    }

    .sidebar-link.active svg { opacity: 1; }

    .sidebar-link .coming-tag {
      margin-left: auto;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.15rem 0.5rem;
      border-radius: 6px;
      background: rgba(251,191,36,0.12);
      color: var(--clr-amber);
      border: 1px solid rgba(251,191,36,0.2);
    }

    .sidebar-footer {
      padding: 1rem 1.2rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .sidebar-logout {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      width: 100%;
      padding: 0.7rem 0.8rem;
      border: none;
      border-radius: 10px;
      background: rgba(248,113,113,0.08);
      color: var(--clr-red);
      font-family: var(--font-ui);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .sidebar-logout:hover {
      background: rgba(248,113,113,0.15);
    }

    .sidebar-logout svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* Sidebar overlay for mobile */
    .sidebar-overlay {
      position: fixed; inset: 0; z-index: 40;
      background: rgba(0,0,0,0.6);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .sidebar-overlay.is-visible {
      opacity: 1; pointer-events: auto;
    }

    /* ── Main content ── */
    .admin-main { margin-left: var(--sidebar-w); min-height: 100vh; }
    .admin-topbar { position: sticky; top: 0; z-index: 30; display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: rgba(8,8,8,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
    
    .topbar-left { display: flex; align-items: center; gap: 1rem; }
    .topbar-right { display: flex; align-items: center; gap: 0.75rem; }

    .sidebar-toggle { display: none; align-items: center; justify-content: center; width: 36px; height: 36px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; background: rgba(255,255,255,0.04); color: var(--clr-grey); cursor: pointer; transition: all 0.2s; }
    .sidebar-toggle:hover { background: rgba(255,255,255,0.08); color: var(--clr-white); }
    .sidebar-toggle svg { width: 18px; height: 18px; }

    .topbar-title { font-size: 1.1rem; font-weight: 700; color: var(--clr-white); }
    .topbar-breadcrumb { font-size: 0.72rem; color: rgba(255,255,255,0.3); margin-top: 0.15rem; }

    .admin-content { padding: 2rem; }

    /* ── FILTERS & HEADER ── */
    .page-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 2rem; gap: 1.5rem; flex-wrap: wrap; }
    .search-container { flex: 1; min-width: 280px; position: relative; }
    .search-input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 0.8rem 1rem 0.8rem 2.8rem; color: #fff; font-size: 0.9rem; transition: 0.2s; }
    .search-input:focus { background: rgba(255,255,255,0.07); border-color: var(--clr-purple); outline: none; box-shadow: 0 0 0 4px rgba(168,85,247,0.1); }
    .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); width: 18px; color: rgba(255,255,255,0.3); }

    .filter-group { display: flex; gap: 1rem; flex-wrap: wrap; }
    .filter-select { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 0.6rem 1rem; color: #fff; font-size: 0.82rem; cursor: pointer; outline: none; }
    .filter-select:hover { border-color: rgba(255,255,255,0.2); }

    /* ── TEAMS GRID ── */
    .teams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.25rem; }
    .team-card { background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 1.5rem; transition: 0.2s; position: relative; cursor: pointer; }
    .team-card:hover { background: rgba(255,255,255,0.045); border-color: rgba(255,255,255,0.12); transform: translateY(-2px); }
    .team-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
    .team-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.25rem; }
    .team-college { font-size: 0.75rem; color: rgba(255,255,255,0.4); font-weight: 500; }
    .team-code-badge { font-family: monospace; font-size: 0.7rem; padding: 0.25rem 0.6rem; border-radius: 6px; background: rgba(168,85,247,0.1); color: var(--clr-purple); font-weight: 700; border: 1px solid rgba(168,85,247,0.2); }
    
    .team-stats { display: flex; gap: 1.5rem; margin: 1.25rem 0; padding: 1rem 0; border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .stat-item { display: flex; flex-direction: column; gap: 0.25rem; }
    .stat-val { font-size: 0.9rem; font-weight: 700; color: #fff; }
    .stat-lab { font-size: 0.65rem; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }

    .team-features { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
    .feature-tag { font-size: 0.65rem; padding: 0.35rem 0.75rem; border-radius: 20px; background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6); font-weight: 600; border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 0.35rem; }
    .tag--active { background: rgba(96,165,250,0.1); color: var(--clr-blue); border-color: rgba(96,165,250,0.2); }
    .tag--success { background: rgba(74,222,128,0.1); color: var(--clr-green); border-color: rgba(74,222,128,0.2); }
    .tag--warn { background: rgba(251,191,36,0.1); color: var(--clr-amber); border-color: rgba(251,191,36,0.2); }

    /* ── STATUS BADGES ── */
    .status-badge { display: inline-flex; align-items: center; padding: 0.2rem 0.6rem; border-radius: 6px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
    .badge--paid { background: rgba(74,222,128,0.12); color: var(--clr-green); border: 1px solid rgba(74,222,128,0.2); }
    .badge--pending { background: rgba(251,191,36,0.12); color: var(--clr-amber); border: 1px solid rgba(251,191,36,0.2); }

    /* ── MODAL / SLIDE PANEL ── */
    .detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 100; opacity: 0; pointer-events: none; transition: 0.3s; display: flex; justify-content: flex-end; }
    .detail-overlay.is-active { opacity: 1; pointer-events: auto; }
    .detail-panel { width: 100%; max-width: 500px; background: #0c0c0e; border-left: 1px solid rgba(255,255,255,0.1); padding: 2.5rem; overflow-y: auto; transform: translateX(100%); transition: 0.4s cubic-bezier(0.16,1,0.3,1); position: relative; }
    .detail-overlay.is-active .detail-panel { transform: translateX(0); }
    .close-panel { position: absolute; top: 1.5rem; right: 1.5rem; background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; padding: 0.5rem; border-radius: 50%; transition: 0.2s; }
    .close-panel:hover { background: rgba(255,255,255,0.05); color: #fff; }

    .section-title { font-size: 0.75rem; font-weight: 700; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.15em; margin: 2rem 0 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.5rem; }
    .detail-row { display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: 0.88rem; }
    .detail-label { color: rgba(255,255,255,0.4); }
    .detail-val { font-weight: 500; text-align: right; }

    .member-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 0.5rem; }
    .member-info { display: flex; flex-direction: column; gap: 0.15rem; }
    .member-name { font-size: 0.88rem; font-weight: 600; }
    .member-phone { font-size: 0.72rem; color: rgba(255,255,255,0.4); }

    .action-btn { width: 100%; padding: 0.85rem; border-radius: 12px; font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: 0.2s; border: none; margin-top: 1rem; }
    .btn--primary { background: var(--clr-blue); color: #000; }
    .btn--primary:hover { background: #93c5fd; }
    .btn--outline { background: none; border: 1px solid rgba(255,255,255,0.1); color: #fff; }
    .btn--outline:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); }

    .pagination { display: flex; justify-content: center; align-items: center; gap: 0.5rem; margin-top: 3rem; }
    .page-btn { padding: 0.5rem 1rem; border-radius: 8px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: #fff; cursor: pointer; transition: 0.2s; }
    .page-btn:hover:not(:disabled) { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }
    .page-btn.active { background: var(--clr-purple); border-color: var(--clr-purple); font-weight: 700; color: #fff; }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Empty State ── */
    .empty-state { text-align: center; padding: 5rem 2rem; }
    .empty-icon { width: 64px; height: 64px; background: rgba(255,255,255,0.03); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; color: rgba(255,255,255,0.1); }

    @media (max-width: 860px) {
      .admin-sidebar { transform: translateX(-100%); }
      .admin-main { margin-left: 0; }
      .admin-content { padding: 1.25rem; }
    }
  </style>
</head>
<body>

  <div class="grain-overlay" aria-hidden="true"></div>

  <!-- ── SIDEBAR ── -->
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="sidebar-header">
      <img src="/logo.png" alt="Logo" class="sidebar-logo" />
      <div class="sidebar-brand">
        <span class="sidebar-brand-name">UDBHAV'26</span>

      </div>
    </div>

    <nav class="sidebar-nav">
      <span class="sidebar-nav-label">Main</span>

      <a href="/admin/dashboard.html" class="sidebar-link" id="navDashboard">

      </a>

      </a>

      <a href="/admin/team.html" class="sidebar-link active" id="navTeams">

      <a href="/admin/problem-statements.html" class="sidebar-link">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>

      </a>

      <span class="sidebar-nav-label" style="margin-top:0.5rem;">Coming Soon</span>

    <div class="sidebar-footer">
      <button class="sidebar-logout" id="logoutBtn">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <main class="admin-main">
    <div class="admin-topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
          <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <div class="topbar-title">Teams Management</div>
          <div class="topbar-breadcrumb">Admin / Teams</div>
        </div>
      </div>
      <div class="topbar-right">
        <button id="importTeamsBtn" class="page-btn" style="background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.1);">Import Teams</button>
      </div>
    </div>

    <div class="admin-content">
      <div class="page-header">
        <div class="search-container">
          <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="teamSearch" class="search-input" placeholder="Search by team name, code, college or leader..." />
        </div>
        <div class="filter-group">
          <select id="statusFilter" class="filter-select">
            <option value="all">All Payments</option>
            <option value="paid">Paid</option>
            <option value="pending">Pending</option>
          </select>
          <select id="mentorshipFilter" class="filter-select">
            <option value="all">All Mentorship</option>
            <option value="approved">Approved</option>
            <option value="pending">Pending Verification</option>
            <option value="not_requested">Not Requested</option>
          </select>
        </div>
      </div>

      <div id="teamsGrid" class="teams-grid">
        <!-- Loader -->
        <div style="grid-column:1/-1; text-align:center; padding:5rem; color:rgba(255,255,255,0.3);">Loading teams...</div>
      </div>

      <div id="pagination" class="pagination"></div>
    </div>
  </main>

  <!-- ── DETAIL PANEL ── -->
  <div id="detailOverlay" class="detail-overlay">
    <div class="detail-panel" id="detailPanel">
      <button class="close-panel" id="closeDetail"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      
      <div id="detailContent">
        <!-- Dynamic Content -->
      </div>
    </div>
  </div>

  <script type="module">
    import { AdminAuth, AdminUI } from '/src/admin.js';

    if (!AdminAuth.isAuthenticated()) { window.location.href = '/admin/login.html'; }
    const apiHeaders = () => ({ 'X-Admin-Secret': AdminAuth.getToken(), 'Content-Type': 'application/json' });

    let currentPage = 1;
    let teams = [];
    let stats = {};

    async function fetchTeams() {
      const q = document.getElementById('teamSearch').value;
      const status = document.getElementById('statusFilter').value;
      const mentorship = document.getElementById('mentorshipFilter').value;
      
      const params = new URLSearchParams({
        page: currentPage,
        limit: 12,
        q: q,
        status: status !== 'all' ? status : ''
      });

      try {
        const res = await fetch(`/api/admin/teams?${params}`, { headers: apiHeaders() });
        const data = await res.json();
        if(!data.success) throw new Error(data.error);
        
        // Frontend filtering for mentorship since API doesn't have it yet
        let filteredTeams = data.teams || [];
        if (mentorship !== 'all') {
          filteredTeams = filteredTeams.filter(t => t.mentorshipStatus === mentorship);
        }

        renderTeams(filteredTeams);
        renderPagination(data.pagination);
      } catch(err) {
        console.error(err);
        AdminUI.toast('Failed to load teams', 'error');
      }
    }

    function renderTeams(teams) {
      const grid = document.getElementById('teamsGrid');
      if (teams.length === 0) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-icon"><svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div class="empty-title">No teams found</div><div class="coming-soon-sub">Try adjusting your filters or search query</div></div>';
        return;
      }

      grid.innerHTML = teams.map(t => {
        const hasPS = !!t.psSelectionId;
        const mentorship = t.mentorshipStatus;
        return `
          <div class="team-card" onclick="showTeamDetail('${t._id}')">
            <div class="team-card-header">
              <div>
                <div class="team-name">${t.teamName}</div>
                <div class="team-college">${t.collegeName}</div>
              </div>
              <div class="team-code-badge">${t.code || 'NO-CODE'}</div>
            </div>
            
            <div class="team-stats">
              <div class="stat-item">
                <span class="stat-val">${(t.memberCount || 1) + (t.members?.length || 0)}</span>
                <span class="stat-lab">Members</span>
              </div>
              <div class="stat-item">
                <span class="stat-val">${t.paymentStatus === 'paid' ? '₹' + (t.totalAmount || 800) : 'Unpaid'}</span>
                <span class="stat-lab">Payment</span>
              </div>
            </div>

            <div class="team-features">
              ${t.paymentStatus === 'paid' ? '<span class="status-badge badge--paid">Paid</span>' : '<span class="status-badge badge--pending">Pending</span>'}
              <span class="feature-tag ${hasPS ? 'tag--success' : ''}">
                <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                ${hasPS ? (t.psSelectionId?.title || 'PS Selected') : 'No PS'}
              </span>
              ${t.mentorSession ? `
                <span class="feature-tag ${t.mentorshipStatus === 'approved' ? 'tag--success' : (t.mentorshipReceiptUrl ? 'tag--active' : 'tag--warn')}">
                  <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                  ${t.mentorshipStatus === 'approved' ? 'Mentor Active' : (t.mentorshipReceiptUrl ? 'Review Needed' : 'Receipt Pending')}
                </span>
              ` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function renderPagination(p) {
      const el = document.getElementById('pagination');
      if (!p || p.totalPages <= 1) { el.innerHTML = ''; return; }
      
      let html = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">Prev</button>`;
      for (let i = 1; i <= p.totalPages; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
      }
      html += `<button class="page-btn" ${currentPage === p.totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">Next</button>`;
      el.innerHTML = html;
    }

    window.changePage = (page) => {
      currentPage = page;
      fetchTeams();
    };

    window.showTeamDetail = async (id) => {
      try {
        const res = await fetch(`/api/admin/teams/${id}`, { headers: apiHeaders() });
        const data = await res.json();
        if(!data.success) throw new Error(data.error);
        const t = data.team;
        if(!t) return;

        const content = document.getElementById('detailContent');
        const membersHtml = (t.members || []).map(m => `
          <div class="member-item">
            <div class="member-info">
              <span class="member-name">${m.name}</span>
              <span class="member-phone">${m.phone}</span>
            </div>
          </div>
        `).join('') || '<div style="color:rgba(255,255,255,0.2); font-size:0.8rem; text-align:center;">No other members added</div>';

        content.innerHTML = `
          <h2 style="font-size:1.8rem; font-weight:800; margin-bottom:0.5rem;">${t.teamName}</h2>
          <div style="color:rgba(255,255,255,0.4); font-size:0.9rem; margin-bottom:2rem;">${t.collegeName} • ${t.branch}</div>

          <div class="section-title">Participation Status</div>
          <div class="detail-row"><span class="detail-label">Team Code</span><span class="detail-val" style="font-family:monospace; color:var(--clr-purple); font-weight:700;">${t.code || 'Not Assigned'}</span></div>
          <div class="detail-row"><span class="detail-label">Payment</span><span class="detail-val">${t.paymentStatus === 'paid' ? '<span style="color:var(--clr-green)">Paid (₹'+t.totalAmount+')</span>' : '<span style="color:var(--clr-amber)">Pending</span>'}</span></div>
          <div class="detail-row"><span class="detail-label">Registered At</span><span class="detail-val">${new Date(t.createdAt).toLocaleDateString()}</span></div>

          <div class="section-title">Problem Statement</div>
          ${t.psSelectionId ? `
            <div style="background:rgba(96,165,250,0.05); border:1px solid rgba(96,165,250,0.1); border-radius:12px; padding:1rem;">
              <div style="font-weight:700; color:var(--clr-blue); margin-bottom:0.25rem;">${t.psSelectionId.title}</div>
              <div style="font-size:0.75rem; color:rgba(255,255,255,0.4);">${t.psSelectionId.domain || 'Hackathon Track'}</div>
            </div>
          ` : `
            <div style="color:rgba(255,255,255,0.25); font-style:italic;">No problem statement selected yet.</div>
          `}

          <div class="section-title">Mentorship</div>
          <div class="detail-row"><span class="detail-label">Mentor Session</span><span class="detail-val">${t.mentorSession ? 'Opted In' : 'Not Opted'}</span></div>
          ${t.mentorSession ? `
            <div class="detail-row"><span class="detail-label">Verification</span><span class="detail-val">
              ${t.mentorshipStatus === 'approved' ? '<span style="color:var(--clr-green)">Approved</span>' : t.mentorshipStatus === 'pending' ? '<span style="color:var(--clr-blue)">Pending Verification</span>' : 'Not Requested'}
            </span></div>
            ${t.mentorshipReceiptUrl ? `
              <div style="margin-top:1rem; margin-bottom:1rem;">
                <div style="font-size:0.75rem; color:rgba(255,255,255,0.3); margin-bottom:0.5rem;">Payment Receipt</div>
                <img src="${t.mentorshipReceiptUrl}" style="width:100%; border-radius:12px; border:1px solid rgba(255,255,255,0.1); cursor:pointer; background:#111; min-height:200px; object-fit:contain;" onclick="window.open(this.src)">
              </div>
            ` : `
              <div style="padding:1rem; background:rgba(251,191,36,0.05); border:1px solid rgba(251,191,36,0.1); border-radius:10px; margin:1rem 0; font-size:0.8rem; color:var(--clr-amber);">
                No receipt uploaded yet. Approve manually if payment is verified via other means.
              </div>
            `}
            ${t.mentorshipStatus !== 'approved' ? `
              <button class="action-btn btn--primary" onclick="approveMentorship('${t._id}')">Approve Mentorship</button>
            ` : ''}
          ` : ''}

          <div class="section-title">Team Leader</div>
          <div class="detail-row"><span class="detail-label">Name</span><span class="detail-val">${t.leader.name}</span></div>
          <div class="detail-row"><span class="detail-label">Email</span><span class="detail-val">${t.leader.email}</span></div>
          <div class="detail-row"><span class="detail-label">Phone</span><span class="detail-val">${t.leader.phone}</span></div>

          <div class="section-title">Members (${t.members?.length || 0})</div>
          ${membersHtml}

          <div style="margin-top:3rem; display:flex; gap:1rem;">
            <button class="action-btn btn--outline" style="flex:1;" onclick="AdminUI.toast('Exporting team report...')">Export Report</button>
            <button class="action-btn btn--outline" style="flex:1; color:var(--clr-red); border-color:rgba(248,113,113,0.2);" onclick="deleteTeam('${t._id}')">Delete Team</button>
          </div>
        `;

        document.getElementById('detailOverlay').classList.add('is-active');
      } catch(err) { AdminUI.toast('Error loading detail', 'error'); }
    };

    window.approveMentorship = async (id) => {
      if(!confirm('Approve mentorship payment for this team?')) return;
      try {
        const res = await fetch(`/api/admin/teams/${id}/approve-mentorship`, { method: 'POST', headers: apiHeaders() });
        const data = await res.json();
        if(data.success) {
          AdminUI.toast('Mentorship approved!', 'success');
          showTeamDetail(id);
          fetchTeams();
        } else throw new Error(data.error);
      } catch(err) { AdminUI.toast(err.message, 'error'); }
    };

    window.deleteTeam = async (id) => {
      if(!confirm('Permanently delete this team?')) return;
      try {
        const res = await fetch(`/api/admin/teams/${id}`, { method: 'DELETE', headers: apiHeaders() });
        const data = await res.json();
        if(data.success) {
          AdminUI.toast('Team deleted', 'success');
          document.getElementById('detailOverlay').classList.remove('is-active');
          fetchTeams();
        } else throw new Error(data.error);
      } catch(err) { AdminUI.toast(err.message, 'error'); }
    };

    document.getElementById('closeDetail').addEventListener('click', () => {
      document.getElementById('detailOverlay').classList.remove('is-active');
    });

    document.getElementById('teamSearch').addEventListener('input', () => {
      currentPage = 1;
      fetchTeams();
    });
    document.getElementById('statusFilter').addEventListener('change', fetchTeams);
    document.getElementById('mentorshipFilter').addEventListener('change', fetchTeams);

    document.getElementById('logoutBtn').addEventListener('click', () => {
      AdminAuth.logout(); window.location.href = '/admin/login.html';
    });

    // ── Sidebar Toggle Logic ──
    const sidebar = document.querySelector('.admin-sidebar');
    const toggle = document.getElementById('sidebarToggle');
    const overlay = document.createElement('div');
    overlay.className = 'sidebar-overlay';
    document.body.appendChild(overlay);

    toggle.addEventListener('click', () => {
      sidebar.classList.add('is-open');
      overlay.classList.add('is-visible');
    });
    overlay.addEventListener('click', () => {
      sidebar.classList.remove('is-open');
      overlay.classList.remove('is-visible');
    });

    fetchTeams();
  </script>
</body>
</html>
