<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule — UDBHAV'26 Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ── Reset ── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --clr-bg: #080808;
            --clr-surface: #0f0f0f;
            --clr-white: #ffffff;
            --clr-grey: #888888;
            --clr-green: #4ade80;
            --clr-red: #f87171;
            --clr-blue: #60a5fa;
            --clr-amber: #fbbf24;
            --clr-primary: #8b5cf6;
            --font-display: 'Bebas Neue', sans-serif;
            --font-ui: 'Inter', sans-serif;
            --sidebar-w: 260px;
        }

        html { background: #000; }
        body {
            font-family: var(--font-ui);
            background: var(--clr-bg);
            color: var(--clr-white);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

        /* ── Grain overlay ── */
        .grain-overlay {
            position: fixed; inset: 0; z-index: 99;
            pointer-events: none; opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 200px 200px; mix-blend-mode: overlay;
        }

        /* ── SIDEBAR ── */
        .admin-sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: rgba(12,12,12,0.95);
      border-right: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(30px);
      z-index: 50;
      display: flex;
      flex-direction: column;
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
    }

    .sidebar-header {
      padding: 1.5rem 1.4rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .sidebar-logo { height: 28px; width: auto; opacity: 0.85; }

    .sidebar-brand {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .sidebar-brand-name {
      font-family: var(--font-display);
      font-size: 1.2rem;
      letter-spacing: 0.06em;
      color: var(--clr-white);
      line-height: 1;
    }

    .sidebar-brand-sub {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    .sidebar-nav {
      flex: 1;
      padding: 1rem 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .sidebar-nav-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      padding: 0.8rem 0.6rem 0.4rem;
    }

    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 0.8rem;
      border-radius: 10px;
      text-decoration: none;
      font-size: 0.84rem;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      transition: all 0.2s;
    }

    .sidebar-link:hover {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.8);
    }

    .sidebar-link.active {
      background: rgba(255,255,255,0.08);
      color: var(--clr-white);
      font-weight: 600;
    }

    .sidebar-link svg {
      width: 18px; height: 18px;
      flex-shrink: 0;
      opacity: 0.6;
    }

    .sidebar-link.active svg { opacity: 1; }

    .sidebar-link .coming-tag {
      margin-left: auto;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.15rem 0.5rem;
      border-radius: 6px;
      background: rgba(251,191,36,0.12);
      color: var(--clr-amber);
      border: 1px solid rgba(251,191,36,0.2);
    }

    .sidebar-footer {
      padding: 1rem 1.2rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .sidebar-logout {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      width: 100%;
      padding: 0.7rem 0.8rem;
      border: none;
      border-radius: 10px;
      background: rgba(248,113,113,0.08);
      color: var(--clr-red);
      font-family: var(--font-ui);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      bottom: 10px;
      transition: background 0.2s;
    }

    .sidebar-logout:hover {
      background: rgba(248,113,113,0.15);
    }

    .sidebar-logout svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* Sidebar overlay for mobile */
    .sidebar-overlay {
      position: fixed; inset: 0; z-index: 40;
      background: rgba(0,0,0,0.6);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .sidebar-overlay.is-visible {
      opacity: 1; pointer-events: auto;
    }

        /* ── MAIN CONTENT ── */
        .admin-main {
            margin-left: var(--sidebar-w);
            min-height: 100vh;
            padding: 0;
        }

        .admin-topbar {
            position: sticky;
            top: 0;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            background: rgba(8,8,8,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .topbar-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--clr-white);
        }

        .topbar-breadcrumb {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.3);
            margin-top: 0.15rem;
        }

        .admin-content {
            padding: 2rem;
            max-width: 1200px;
        }

        /* ── Form Elements ── */
        .section-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 2rem;
            padding: 1.5rem;
        }

        .section-header {
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--clr-white);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(255,255,255,0.4);
        }

        input[type="text"],
        input[type="datetime-local"],
        textarea {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 0.75rem;
            color: var(--clr-white);
            font-family: var(--font-ui);
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--clr-primary);
            background: rgba(255,255,255,0.06);
        }

        /* ── Timeline Table ── */
        .timeline-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .timeline-table th {
            text-align: left;
            padding: 0.75rem;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .timeline-table td {
            padding: 0.75rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: var(--font-ui);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--clr-primary);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-danger {
            background: rgba(248,113,113,0.1);
            color: var(--clr-red);
            border: 1px solid rgba(248,113,113,0.2);
        }

        .btn-danger:hover {
            background: rgba(248,113,113,0.2);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.6);
        }

        .btn-outline:hover {
            background: rgba(255,255,255,0.05);
            color: white;
        }

        .btn-save-fixed {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 100;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            padding: 1rem 2rem;
            font-size: 1rem;
        }

        /* ── Animations ── */
        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <main class="admin-main">
        <div class="admin-topbar">
            <div>
                <div class="topbar-title">Global Schedule & Timings</div>
                <div class="topbar-breadcrumb">Admin / Schedule</div>
            </div>
        </div>

        <div class="admin-content">
            <!-- 1. Countdown Section -->
            <div class="section-card fade-in">
                <div class="section-header">
                    <span class="section-title">Countdown Protocol</span>
                </div>
                <div class="form-group">
                    <label>Main Target Date (PS Release Countdown)</label>
                    <input type="datetime-local" id="targetDate">
                </div>
            </div>

            <!-- 2. Dashboard Links Visibility -->
            <div class="section-card fade-in" style="animation-delay: 0.1s">
                <div class="section-header">
                    <span class="section-title">Dashboard Command Center Links</span>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Resources Hub Visibility</label>
                        <input type="datetime-local" id="link-resources">
                    </div>
                    <div class="form-group">
                        <label>Mentorship Access Visibility</label>
                        <input type="datetime-local" id="link-mentorship">
                    </div>
                    <div class="form-group">
                        <label>GitHub Submission Visibility</label>
                        <input type="datetime-local" id="link-githubSubmission">
                    </div>
                    <div class="form-group">
                        <label>PPT Submission Visibility</label>
                        <input type="datetime-local" id="link-pptSubmission">
                    </div>
                    <div class="form-group">
                        <label>Project Drive Visibility</label>
                        <input type="datetime-local" id="link-projectSubmission">
                    </div>
                </div>
            </div>

            <!-- 3. Timeline Stages -->
            <div class="section-card fade-in" style="animation-delay: 0.2s">
                <div class="section-header">
                    <span class="section-title">Mission Timeline Stages</span>
                    <button class="btn btn-outline" onclick="addStage()">+ Add Stage</button>
                </div>
                <div style="overflow-x: auto;">
                    <table class="timeline-table">
                        <thead>
                            <tr>
                                <th>Display Time</th>
                                <th>Title</th>
                                <th>Description</th>
                                <th>System Timestamp</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="timeline-body">
                            <!-- Stages will be added here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <button class="btn btn-primary btn-save-fixed" id="saveBtn" onclick="saveSchedule()">
        Save Changes
    </button>

    <script>
        let scheduleData = null;

        async function fetchSchedule() {
            try {
                const token = localStorage.getItem('udbhav_admin_token');
                if (!token) window.location.href = '/admin/login.html';

                const res = await fetch('/api/admin/schedule', {
                    headers: { 'x-admin-secret': token }
                });
                const data = await res.json();
                if (data.success) {
                    scheduleData = data.config;
                    renderSchedule();
                } else {
                    alert('Error loading schedule: ' + (data.error || 'Unknown error'));
                }
            } catch (err) {
                console.error('Failed to fetch schedule:', err);
                alert('Error loading schedule');
            }
        }

        function formatDateForInput(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            // Adjust to local time string for datetime-local input (YYYY-MM-DDTHH:mm)
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            const hours = String(d.getHours()).padStart(2, '0');
            const minutes = String(d.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day}T${hours}:${minutes}`;
        }

        function renderSchedule() {
            document.getElementById('targetDate').value = formatDateForInput(scheduleData.targetDate);
            
            for (const [key, value] of Object.entries(scheduleData.links)) {
                const el = document.getElementById(`link-${key}`);
                if (el) el.value = formatDateForInput(value);
            }

            const tbody = document.getElementById('timeline-body');
            tbody.innerHTML = '';
            scheduleData.timelineStages.forEach((stage, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><input type="text" value="${stage.time}" onchange="updateStage(${index}, 'time', this.value)"></td>
                    <td><input type="text" value="${stage.title}" onchange="updateStage(${index}, 'title', this.value)"></td>
                    <td><input type="text" value="${stage.description}" onchange="updateStage(${index}, 'description', this.value)"></td>
                    <td><input type="datetime-local" value="${formatDateForInput(stage.timestamp)}" onchange="updateStage(${index}, 'timestamp', this.value)"></td>
                    <td><button class="btn btn-danger" onclick="removeStage(${index})">Remove</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateStage(index, field, value) {
            scheduleData.timelineStages[index][field] = field === 'timestamp' ? new Date(value).toISOString() : value;
        }

        function addStage() {
            scheduleData.timelineStages.push({
                time: "New Time",
                title: "New Stage",
                description: "Description",
                timestamp: new Date().toISOString()
            });
            renderSchedule();
        }

        function removeStage(index) {
            scheduleData.timelineStages.splice(index, 1);
            renderSchedule();
        }

        async function saveSchedule() {
            const btn = document.getElementById('saveBtn');
            btn.textContent = 'Saving...';
            btn.disabled = true;

            const payload = {
                targetDate: new Date(document.getElementById('targetDate').value).toISOString(),
                links: {
                    resources: new Date(document.getElementById('link-resources').value).toISOString(),
                    mentorship: new Date(document.getElementById('link-mentorship').value).toISOString(),
                    githubSubmission: new Date(document.getElementById('link-githubSubmission').value).toISOString(),
                    pptSubmission: new Date(document.getElementById('link-pptSubmission').value).toISOString(),
                    projectSubmission: new Date(document.getElementById('link-projectSubmission').value).toISOString(),
                },
                timelineStages: scheduleData.timelineStages
            };

            try {
                const token = localStorage.getItem('udbhav_admin_token');
                const res = await fetch('/api/admin/schedule', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-admin-secret': token
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    alert('Schedule updated successfully!');
                    scheduleData = data.config;
                    renderSchedule();
                } else {
                    alert('Update failed: ' + data.error);
                }
            } catch (err) {
                console.error('Save failed:', err);
                alert('Save failed');
            } finally {
                btn.textContent = 'Save Changes';
                btn.disabled = false;
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('udbhav_admin_token');
            localStorage.removeItem('udbhav_admin_time');
            window.location.href = '/admin/login.html';
        });

        // Init
        fetchSchedule();
    </script>
</body>
</html>
