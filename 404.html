<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- Fonts: Bebas Neue (display) + Sora (UI) + JetBrains Mono (terminal) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ── Reset ─────────────────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --clr-bg:          #060608;
      --clr-purple:      #8b5cf6;
      --clr-purple-dim:  rgba(139,92,246,0.14);
      --clr-border:      rgba(255,255,255,0.07);
      --clr-white:       #ffffff;
      --clr-muted:       rgba(255,255,255,0.35);
      --clr-faint:       rgba(255,255,255,0.12);
      --font-display:    'Bebas Neue', sans-serif;
      --font-ui:         'Sora', sans-serif;
      --font-mono:       'JetBrains Mono', monospace;
    }

    html, body {
      width: 100%; min-height: 100svh;
      background: var(--clr-bg);
      color: var(--clr-white);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Scanlines ───────────────────────────────────────────────────── */
    .scanline {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(
        to bottom, transparent 0, transparent 3px,
        rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px
      );
    }

    /* ── Aurora ──────────────────────────────────────────────────────── */
    .aurora {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(139,92,246,0.09) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(168,85,247,0.05) 0%, transparent 60%);
    }

    /* ── Grain ───────────────────────────────────────────────────────── */
    .grain {
      position: fixed; inset: -50%; width: 200%; height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none; z-index: 2; opacity: 0.45;
      animation: grain 8s steps(10) infinite;
    }
    @keyframes grain {
      0%,100%{transform:translate(0,0)} 10%{transform:translate(-2%,-3%)} 20%{transform:translate(3%,2%)}
      30%{transform:translate(-1%,3%)} 40%{transform:translate(2%,-1%)} 50%{transform:translate(-3%,2%)}
      60%{transform:translate(1%,-2%)} 70%{transform:translate(3%,3%)} 80%{transform:translate(-2%,1%)}
      90%{transform:translate(2%,-3%)}
    }

    /* ── Layout ──────────────────────────────────────────────────────── */
    .page {
      position: relative; z-index: 10;
      min-height: 100svh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3rem 1.5rem; text-align: center;
    }

    /* ── Terminal badge ──────────────────────────────────────────────── */
    .terminal-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.35rem 0.85rem;
      background: var(--clr-purple-dim);
      border: 1px solid rgba(139,92,246,0.25);
      border-radius: 6px;
      font-family: var(--font-mono); font-size: 0.72rem;
      color: var(--clr-purple); letter-spacing: 0.06em;
      margin-bottom: 2rem;
      animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    .terminal-badge__dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--clr-purple);
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── Glitch 404 ──────────────────────────────────────────────────── */
    .glitch-wrap {
      position: relative; margin-bottom: 0.5rem;
      animation: fadeUp 0.55s 0.08s cubic-bezier(0.16,1,0.3,1) both;
    }
    .glitch {
      font-family: var(--font-display);
      font-size: clamp(7rem, 28vw, 16rem);
      line-height: 0.9; color: var(--clr-white);
      letter-spacing: -0.02em;
      position: relative; display: inline-block;
      -webkit-mask-image: linear-gradient(to bottom, #fff 55%, transparent 95%);
      mask-image:         linear-gradient(to bottom, #fff 55%, transparent 95%);
    }
    .glitch::before, .glitch::after {
      content: '404'; position: absolute; inset: 0;
      font-family: var(--font-display); font-size: inherit;
      line-height: inherit; letter-spacing: inherit;
    }
    .glitch::before {
      color: var(--clr-purple);
      clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
      animation: glitch-top 3.5s infinite linear;
    }
    .glitch::after {
      color: rgba(0,255,255,0.55);
      clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%);
      animation: glitch-bot 4s 0.3s infinite linear;
    }
    @keyframes glitch-top {
      0%,90%,100%{transform:translate(0,0);opacity:0}
      92%{transform:translate(-4px,-2px);opacity:1}
      94%{transform:translate(3px,1px);opacity:1}
      96%{transform:translate(-2px,0);opacity:0.7}
      98%{transform:translate(0,0);opacity:0}
    }
    @keyframes glitch-bot {
      0%,85%,100%{transform:translate(0,0);opacity:0}
      88%{transform:translate(4px,2px);opacity:1}
      91%{transform:translate(-3px,-1px);opacity:1}
      94%{transform:translate(2px,0);opacity:0.6}
      97%{transform:translate(0,0);opacity:0}
    }

    /* ── Labels & copy ───────────────────────────────────────────────── */
    .error-label {
      font-family: var(--font-mono); font-size: 0.75rem;
      color: var(--clr-purple); letter-spacing: 0.18em; text-transform: uppercase;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.55s 0.15s cubic-bezier(0.16,1,0.3,1) both;
    }
    .headline {
      font-size: clamp(1.1rem, 3vw, 1.5rem); font-weight: 600;
      color: var(--clr-white); margin-bottom: 0.75rem;
      animation: fadeUp 0.55s 0.22s cubic-bezier(0.16,1,0.3,1) both;
    }
    .subline {
      font-size: 0.9rem; color: var(--clr-muted);
      line-height: 1.65; max-width: 420px; margin: 0 auto 2rem;
      animation: fadeUp 0.55s 0.28s cubic-bezier(0.16,1,0.3,1) both;
    }
    .terminal-line {
      font-family: var(--font-mono); font-size: 0.72rem;
      color: var(--clr-faint); letter-spacing: 0.06em; margin-bottom: 2.5rem;
      animation: fadeUp 0.55s 0.32s cubic-bezier(0.16,1,0.3,1) both;
    }
    .terminal-line em { font-style: normal; color: rgba(139,92,246,0.5); }

    /* ── Buttons ─────────────────────────────────────────────────────── */
    .btn-row {
      display: flex; align-items: center; gap: 0.65rem;
      flex-wrap: wrap; justify-content: center;
      animation: fadeUp 0.55s 0.36s cubic-bezier(0.16,1,0.3,1) both;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 0.45rem;
      padding: 0.72rem 1.4rem; border-radius: 8px;
      font-family: var(--font-ui); font-size: 0.875rem; font-weight: 500;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      white-space: nowrap; border: 1px solid transparent;
    }
    .btn--primary { background: var(--clr-purple); color: #fff; }
    .btn--primary:hover {
      background: #7c3aed; transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(139,92,246,0.35);
    }
    .btn--outline {
      background: transparent; color: var(--clr-muted);
      border-color: var(--clr-border);
    }
    .btn--outline:hover {
      background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.18);
      color: var(--clr-white); transform: translateY(-2px);
    }
    .back-link {
      display: block; margin-top: 1.5rem;
      font-size: 0.75rem; color: var(--clr-faint);
      text-decoration: none; letter-spacing: 0.06em; transition: color 0.2s;
      animation: fadeUp 0.55s 0.42s cubic-bezier(0.16,1,0.3,1) both;
    }
    .back-link:hover { color: var(--clr-muted); }

    /* ── Cursor removed — use default browser cursor ─────────────── */
    .cursor { display: none !important; }

    /* ── Entrance ────────────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); filter: blur(6px); }
      to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
    }

    /* ── Mobile ──────────────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .btn-row { flex-direction: column; align-items: stretch; width: 100%; max-width: 280px; }
      .btn     { justify-content: center; }
    }
  </style>
</head>

<body>

  <div class="cursor" id="cursor404" aria-hidden="true"></div>
  <div class="aurora"   aria-hidden="true"></div>

  <main class="page" role="main">

      <em>&gt;</em> ERROR 0x404 &nbsp;&middot;&nbsp; route not found &nbsp;&middot;&nbsp; <em>udbhav26.in</em>
